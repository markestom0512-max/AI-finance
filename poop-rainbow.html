<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💩 Arc-en-ciel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #000;
    }

    /* Fond arc-en-ciel animé */
    .rainbow-bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        135deg,
        #ff0000, #ff7700, #ffff00, #00ff00,
        #0000ff, #8b00ff, #ff0000, #ff7700,
        #ffff00, #00ff00, #0000ff, #8b00ff
      );
      background-size: 400% 400%;
      animation: rainbowShift 3s linear infinite;
      filter: brightness(1.1) saturate(1.4);
    }

    @keyframes rainbowShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Effet de vagues sur le fond */
    .rainbow-bg::after {
      content: '';
      position: absolute;
      inset: -50%;
      background: inherit;
      animation: wave 4s ease-in-out infinite alternate;
      opacity: 0.6;
    }

    @keyframes wave {
      0%   { transform: rotate(0deg) scale(1.5); }
      100% { transform: rotate(20deg) scale(1.8); }
    }

    /* Conteneur du caca */
    .poop-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Le caca qui tourne */
    .poop {
      font-size: 150px;
      animation:
        spin 2s linear infinite,
        bounce 1s ease-in-out infinite alternate,
        scale-pulse 2s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(0,0,0,0.8))
              drop-shadow(0 0 60px rgba(255,255,0,0.6));
      cursor: pointer;
      user-select: none;
    }

    .poop:hover {
      animation:
        spin-fast 0.4s linear infinite,
        bounce 0.5s ease-in-out infinite alternate,
        scale-pulse 1s ease-in-out infinite;
      filter: drop-shadow(0 0 40px rgba(255,255,0,1))
              drop-shadow(0 0 80px rgba(255,0,255,0.8));
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes spin-fast {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes bounce {
      from { transform: translateY(0px) rotate(var(--r, 0deg)); }
      to   { transform: translateY(-30px) rotate(var(--r, 0deg)); }
    }

    @keyframes scale-pulse {
      0%   { font-size: 150px; }
      50%  { font-size: 170px; }
      100% { font-size: 150px; }
    }

    /* Étoiles autour */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    .star {
      position: absolute;
      font-size: 24px;
      animation: orbit linear infinite;
    }

    @keyframes orbit {
      0%   { transform: translate(0, 0) rotate(0deg) scale(0.5); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) rotate(720deg) scale(1.5); opacity: 0; }
    }

    /* Texte disco */
    .title {
      position: relative;
      z-index: 10;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      font-size: 2.5rem;
      font-weight: 900;
      text-align: center;
      color: white;
      text-shadow:
        2px 2px 0 #ff0000,
        4px 4px 0 #ff7700,
        6px 6px 0 #ffff00,
        8px 8px 0 #00ff00,
        10px 10px 0 #0000ff,
        12px 12px 0 #8b00ff;
      animation: text-rainbow 1s linear infinite;
      letter-spacing: 4px;
    }

    @keyframes text-rainbow {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    /* Particules de fond flottantes */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: float-up linear infinite;
      opacity: 0.7;
    }

    @keyframes float-up {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.7; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }

    /* Compteur de clics */
    .click-counter {
      position: relative;
      z-index: 10;
      font-family: 'Comic Sans MS', cursive;
      font-size: 1.2rem;
      color: white;
      text-shadow: 0 0 10px #000, 0 0 20px #000;
      background: rgba(0,0,0,0.4);
      padding: 8px 20px;
      border-radius: 30px;
      border: 2px solid rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>

  <div class="rainbow-bg"></div>
  <div class="particles" id="particles"></div>
  <div class="stars" id="stars"></div>

  <div class="poop-wrapper">
    <div class="title">💥 LE CACA COSMIQUE 💥</div>
    <div class="poop" id="poop" onclick="handleClick(event)">💩</div>
    <div class="click-counter" id="counter">Clique sur le caca ! 0 fois</div>
  </div>

  <script>
    // --- Particules flottantes ---
    const particlesEl = document.getElementById('particles');
    const colors = ['#ff0000','#ff7700','#ffff00','#00ff00','#00ffff','#0000ff','#ff00ff','#ffffff'];

    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 20 + 8;
      p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${Math.random() * 100}vw;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration: ${Math.random() * 6 + 4}s;
        animation-delay: -${Math.random() * 10}s;
        filter: blur(${Math.random() * 3}px);
      `;
      particlesEl.appendChild(p);
    }

    // --- Étoiles / emojis orbitaux ---
    const starsEl = document.getElementById('stars');
    const emojis = ['✨','⭐','🌟','💫','🔥','🌈','🎉','⚡','💎','🦄'];

    for (let i = 0; i < 20; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      const startX = Math.random() * 100;
      const startY = Math.random() * 100;
      const tx = (Math.random() - 0.5) * 800;
      const ty = (Math.random() - 0.5) * 800;
      s.style.cssText = `
        left: ${startX}vw;
        top: ${startY}vh;
        --tx: ${tx}px;
        --ty: ${ty}px;
        animation-duration: ${Math.random() * 6 + 4}s;
        animation-delay: -${Math.random() * 10}s;
        font-size: ${Math.random() * 20 + 16}px;
      `;
      starsEl.appendChild(s);
    }

    // --- Compteur de clics + effet explosion ---
    let clicks = 0;
    const counterEl = document.getElementById('counter');
    const poopEl = document.getElementById('poop');

    function handleClick(e) {
      clicks++;
      counterEl.textContent = `Clique sur le caca ! ${clicks} fois 💩`;

      // Emoji explosé qui part dans tous les sens
      const burst = ['💩','💥','✨','🌈','💫','⭐','🔥'];
      for (let i = 0; i < 8; i++) {
        const el = document.createElement('div');
        el.textContent = burst[Math.floor(Math.random() * burst.length)];
        el.style.cssText = `
          position: fixed;
          left: ${e.clientX}px;
          top: ${e.clientY}px;
          font-size: ${Math.random() * 30 + 20}px;
          pointer-events: none;
          z-index: 999;
          transition: transform 0.8s ease-out, opacity 0.8s ease-out;
          transform: translate(0, 0);
          opacity: 1;
        `;
        document.body.appendChild(el);

        const angle = (i / 8) * Math.PI * 2;
        const dist = Math.random() * 200 + 100;
        const dx = Math.cos(angle) * dist;
        const dy = Math.sin(angle) * dist;

        requestAnimationFrame(() => {
          setTimeout(() => {
            el.style.transform = `translate(${dx}px, ${dy}px) rotate(${Math.random()*720}deg) scale(0)`;
            el.style.opacity = '0';
          }, 10);
        });

        setTimeout(() => el.remove(), 900);
      }
    }

    // Message selon nombre de clics
    setInterval(() => {
      if (clicks > 50) {
        counterEl.textContent = `TU ES OBSÉDÉ ! ${clicks} fois 💩🤣`;
        counterEl.style.background = 'rgba(255,0,0,0.5)';
      } else if (clicks > 20) {
        counterEl.textContent = `T'arrêtes pas ! ${clicks} fois 💩😱`;
      }
    }, 500);
  </script>
</body>
</html>
